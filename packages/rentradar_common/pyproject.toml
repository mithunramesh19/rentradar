[project]
name = "rentradar-common"
version = "0.1.0"
description = "Shared models, constants, and geo utilities for RentRadar"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "pydantic[email]>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["rentradar_common"]
